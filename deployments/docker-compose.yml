services:
  brightkids:
    image: techblog/brightkids:latest
    container_name: brightkids
    ports:
      - "8080:8080"
    # Named volume: inherits the image's /data ownership (non-root 65534).
    # Holds the SQLite profiles/progress DB so they survive restarts.
    volumes:
      - brightkids-data:/data
    environment:
      BRIGHTKIDS_LOG_LEVEL: info
      BRIGHTKIDS_LOG_FORMAT: json
      BRIGHTKIDS_DB_PATH: /data/brightkids.db
      BRIGHTKIDS_METRICS_ENABLED: "true"
    restart: unless-stopped

volumes:
  brightkids-data:
