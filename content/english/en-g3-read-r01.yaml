      - { id: o2, label: "bread", tts: "bread" }
      - { id: o3, label: "fish", correct: true, tts: "fish" }
  - prompt: "Moki has four legs. How many legs does Moki have?"
    prompt_text: "לְ-Moki יֵשׁ אַרְבַּע רַגְלַיִם. כַּמָּה רַגְלַיִם יֵשׁ לְ-Moki?"
