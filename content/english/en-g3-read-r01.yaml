    prompt_text: "Moki הוּא חָתוּל. לְ-Moki יֵשׁ זָנָב אָרֹךְ. מָה יֵשׁ לְ-Moki?"
    items:
      - { id: o1, label: "a long nose", tts: "a long nose" }
      - { id: o2, label: "a long tail", correct: true, tts: "a long tail" }
      - { id: o3, label: "a long ear", tts: "a long ear" }
  - prompt: "Moki has green eyes. What color are Moki's eyes?"
    prompt_text: "לְ-Moki יֵשׁ עֵינַיִם יְרֻקּוֹת. בְּאֵיזֶה צֶבַע הָעֵינַיִם שֶׁל Moki?"
