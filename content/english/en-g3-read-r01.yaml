    prompt_text: "Moki אוֹהֵב לִישֹׁן כָּל הַיּוֹם. מָה Moki אוֹהֵב לַעֲשׂוֹת?"
    items:
      - { id: o1, label: "sleep", correct: true, tts: "sleep" }
      - { id: o2, label: "swim", tts: "swim" }
      - { id: o3, label: "fly", tts: "fly" }
  - prompt: "Moki is a small cat. Is Moki big or small?"
    prompt_text: "Moki הוּא חָתוּל קָטָן. Moki גָּדוֹל אוֹ קָטָן?"
    items:
      - { id: o1, label: "big", tts: "big" }
      - { id: o2, label: "tall", tts: "tall" }
      - { id: o3, label: "small", correct: true, tts: "small" }
