      - { id: o2, label: "water", tts: "water" }
      - { id: o3, label: "milk", correct: true, tts: "milk" }
  - prompt: "Moki lives in a house. Where does Moki live?"
    prompt_text: "Moki גָּר בְּבַיִת. אֵיפֹה Moki גָּר?"
