    prompt_text: "לְ-Moki יֵשׁ פַּרְוָה רַכָּה. אֵיךְ הַפַּרְוָה שֶׁל Moki?"
    items:
      - { id: o1, label: "hard", tts: "hard" }
      - { id: o2, label: "soft", correct: true, tts: "soft" }
      - { id: o3, label: "wet", tts: "wet" }
  - prompt: "Moki eats fish. What does Moki eat?"
    prompt_text: "Moki אוֹכֵל דָּג. מָה Moki אוֹכֵל?"
    items:
