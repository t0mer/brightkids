id: en-g4-read-r01
subject: english
grade: 4
difficulty: 2
locale: en-US
direction: ltr
title: "Reading: Ann Reads"
activity: multiple-choice
prompt_tts: "Read about Ann and answer."
instruction: "קִרְאוּ עַל Ann וְעַנּוּ."
questions:
  - prompt: "Ann reads a book every night before bed. When does Ann read?"
    prompt_text: "Ann קוֹרֵאת סֵפֶר כָּל לַיְלָה לִפְנֵי הַשֵּׁנָה. מָתַי Ann קוֹרֵאת?"
    items:
      - { id: o1, label: "every night", correct: true, tts: "every night" }
      - { id: o2, label: "every morning", tts: "every morning" }
      - { id: o3, label: "she never reads", tts: "she never reads" }
  - prompt: "Ann reads a book every night before bed. What does Ann read?"
    prompt_text: "Ann קוֹרֵאת סֵפֶר כָּל לַיְלָה לִפְנֵי הַשֵּׁנָה. מָה Ann קוֹרֵאת?"
    items:
      - { id: o1, label: "a book", correct: true, tts: "a book" }
      - { id: o2, label: "a song", tts: "a song" }
      - { id: o3, label: "a game", tts: "a game" }
  - prompt: "Ann reads before bed. Does she read in the day or at night?"
    prompt_text: "Ann קוֹרֵאת לִפְנֵי הַשֵּׁנָה. הִיא קוֹרֵאת בַּיּוֹם אוֹ בַּלַּיְלָה?"
    items:
      - { id: o1, label: "at night", correct: true, tts: "at night" }
      - { id: o2, label: "in the day", tts: "in the day" }
      - { id: o3, label: "at noon", tts: "at noon" }
  - prompt: "Ann loves stories about animals. Her favorite book is about a brave lion. What is Ann's favorite book about?"
    prompt_text: "Ann אוֹהֶבֶת סִפּוּרִים עַל חַיּוֹת. הַסֵּפֶר הָאָהוּב עָלֶיהָ הוּא עַל אַרְיֵה אַמִּיץ. עַל מָה הַסֵּפֶר הָאָהוּב עַל Ann?"
    items:
      - { id: o1, label: "a brave lion", correct: true, tts: "a brave lion" }
      - { id: o2, label: "a fast car", tts: "a fast car" }
      - { id: o3, label: "a big city", tts: "a big city" }
  - prompt: "Ann gets her books from the library near her school. Where does Ann get her books?"
    prompt_text: "Ann מְקַבֶּלֶת אֶת הַסְּפָרִים שֶׁלָּהּ מֵהַסִּפְרִיָּה לְיַד בֵּית הַסֵּפֶר. מֵאֵיפֹה Ann מְקַבֶּלֶת אֶת הַסְּפָרִים?"
    items:
      - { id: o1, label: "from the shop", tts: "from the shop" }
      - { id: o2, label: "from the library", correct: true, tts: "from the library" }
      - { id: o3, label: "from the park", tts: "from the park" }
  - prompt: "Ann reads with her little sister every evening. Who reads with Ann?"
    prompt_text: "Ann קוֹרֵאת עִם אֲחוֹתָהּ הַקְּטַנָּה כָּל עֶרֶב. מִי קוֹרֵא עִם Ann?"
    items:
      - { id: o1, label: "her teacher", tts: "her teacher" }
      - { id: o2, label: "her little sister", correct: true, tts: "her little sister" }
      - { id: o3, label: "her dog", tts: "her dog" }
  - prompt: "After she reads, Ann writes the story in her notebook. What does Ann do after she reads?"
    prompt_text: "אַחֲרֵי שֶׁהִיא קוֹרֵאת, Ann כּוֹתֶבֶת אֶת הַסִּפּוּר בַּמַּחְבֶּרֶת שֶׁלָּהּ. מָה Ann עוֹשָׂה אַחֲרֵי שֶׁהִיא קוֹרֵאת?"
    items:
      - { id: o1, label: "she writes the story", correct: true, tts: "she writes the story" }
      - { id: o2, label: "she eats dinner", tts: "she eats dinner" }
      - { id: o3, label: "she goes outside", tts: "she goes outside" }
  - prompt: "Ann reads in her cozy chair by the window. Where does Ann sit to read?"
    prompt_text: "Ann קוֹרֵאת בַּכֻּרְסָה הַנּוֹחָה שֶׁלָּהּ לְיַד הַחַלּוֹן. אֵיפֹה Ann יוֹשֶׁבֶת כְּדֵי לִקְרֹא?"
    items:
      - { id: o1, label: "on the floor", tts: "on the floor" }
      - { id: o2, label: "in her cozy chair", correct: true, tts: "in her cozy chair" }
      - { id: o3, label: "in the car", tts: "in the car" }
  - prompt: "Ann reads one new book each week. How many books does Ann read each week?"
    prompt_text: "Ann קוֹרֵאת סֵפֶר חָדָשׁ אֶחָד כָּל שָׁבוּעַ. כַּמָּה סְפָרִים Ann קוֹרֵאת כָּל שָׁבוּעַ?"
    items:
      - { id: o1, label: "five books", tts: "five books" }
      - { id: o2, label: "ten books", tts: "ten books" }
      - { id: o3, label: "one book", correct: true, tts: "one book" }
  - prompt: "Ann reads because it makes her feel happy and calm. Why does Ann read?"
    prompt_text: "Ann קוֹרֵאת כִּי זֶה גּוֹרֵם לָהּ לְהַרְגִּישׁ שְׂמֵחָה וּרְגוּעָה. לָמָּה Ann קוֹרֵאת?"
    items:
      - { id: o1, label: "it makes her happy and calm", correct: true, tts: "it makes her happy and calm" }
      - { id: o2, label: "it makes her tired", tts: "it makes her tired" }
      - { id: o3, label: "it makes her hungry", tts: "it makes her hungry" }
  - prompt: "When Ann finishes a book, she tells her friends about it. What does Ann do when she finishes a book?"
    prompt_text: "כְּשֶׁ-Ann מְסַיֶּמֶת סֵפֶר, הִיא מְסַפֶּרֶת לַחֲבֵרִים שֶׁלָּהּ עָלָיו. מָה Ann עוֹשָׂה כְּשֶׁהִיא מְסַיֶּמֶת סֵפֶר?"
    items:
      - { id: o1, label: "she hides it", tts: "she hides it" }
      - { id: o2, label: "she tells her friends", correct: true, tts: "she tells her friends" }
      - { id: o3, label: "she throws it away", tts: "she throws it away" }
  - prompt: "Ann keeps all her books on a tall blue shelf. Where does Ann keep her books?"
    prompt_text: "Ann שׁוֹמֶרֶת אֶת כָּל הַסְּפָרִים שֶׁלָּהּ עַל מַדָּף כָּחֹל גָּבוֹהַּ. אֵיפֹה Ann שׁוֹמֶרֶת אֶת הַסְּפָרִים?"
    items:
      - { id: o1, label: "on a tall blue shelf", correct: true, tts: "on a tall blue shelf" }
      - { id: o2, label: "under her bed", tts: "under her bed" }
      - { id: o3, label: "in the kitchen", tts: "in the kitchen" }
reward: { stars: 3, sfx: ding, effect: confetti }
