id: en-g4-describe-r01
subject: english
grade: 4
difficulty: 3
locale: en-US
direction: ltr
title: "Describe the Picture"
activity: multiple-choice
prompt_tts: "Look at the picture and answer."
instruction: "הִסְתַּכְּלוּ עַל הַתְּמוּנָה וְעַנּוּ."
questions:
  - prompt: "Look at the picture. A girl is riding a bike. What is the girl doing?"
    prompt_text: "הִסְתַּכְּלוּ עַל הַתְּמוּנָה. יַלְדָּה רוֹכֶבֶת עַל אוֹפַנַּיִם. מָה הַיַּלְדָּה עוֹשָׂה?"
    items:
      - { id: o1, label: "She is riding a bike.", correct: true, tts: "She is riding a bike." }
      - { id: o2, label: "She is eating an apple.", tts: "She is eating an apple." }
      - { id: o3, label: "She is sleeping in bed.", tts: "She is sleeping in bed." }
  - prompt: "Look at the picture. A boy is kicking a ball. What is the boy doing?"
    prompt_text: "הִסְתַּכְּלוּ עַל הַתְּמוּנָה. יֶלֶד בּוֹעֵט בְּכַדּוּר. מָה הַיֶּלֶד עוֹשֶׂה?"
    items:
      - { id: o1, label: "He is kicking a ball.", correct: true, tts: "He is kicking a ball." }
      - { id: o2, label: "He is reading a book.", tts: "He is reading a book." }
      - { id: o3, label: "He is drinking milk.", tts: "He is drinking milk." }
  - prompt: "Look at the picture. A dog is running in the park. What is the dog doing?"
    prompt_text: "הִסְתַּכְּלוּ עַל הַתְּמוּנָה. כֶּלֶב רָץ בַּפַּארְק. מָה הַכֶּלֶב עוֹשֶׂה?"
    items:
      - { id: o1, label: "It is running in the park.", correct: true, tts: "It is running in the park." }
      - { id: o2, label: "It is eating a bone.", tts: "It is eating a bone." }
      - { id: o3, label: "It is sleeping.", tts: "It is sleeping." }
reward: { stars: 3, sfx: ding, effect: confetti }
