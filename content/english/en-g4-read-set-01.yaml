id: en-g4-read-set-01
subject: english
grade: 4
difficulty: 3
locale: en-US
direction: ltr
title: "Reading: The Lost Cat"
activity: multiple-choice
prompt_tts: "Read the story and answer."
instruction: "קִרְאוּ אֶת הַסִּפּוּר וְעַנּוּ."
questions:
  - prompt: "Sam has a cat named Lily. What is the cat's name?"
    prompt_text: "לְ-Sam יֵשׁ חָתוּל בְּשֵׁם Lily. מָה שֵׁם הֶחָתוּל?"
    items:
      - { id: o1, label: "Lily", correct: true, tts: "Lily" }
      - { id: o2, label: "Sam", tts: "Sam" }
      - { id: o3, label: "Max", tts: "Max" }
  - prompt: "One day Lily runs away. What does Lily do?"
    prompt_text: "יוֹם אֶחָד Lily בּוֹרַחַת. מָה Lily עוֹשָׂה?"
    items:
      - { id: o1, label: "runs away", correct: true, tts: "runs away" }
      - { id: o2, label: "goes to sleep", tts: "goes to sleep" }
      - { id: o3, label: "eats fish", tts: "eats fish" }
  - prompt: "Sam looks in the garden. Where does Sam look?"
    prompt_text: "Sam מְחַפֵּשׂ בַּגִּנָּה. אֵיפֹה Sam מְחַפֵּשׂ?"
    items:
      - { id: o1, label: "in the garden", correct: true, tts: "in the garden" }
      - { id: o2, label: "in the house", tts: "in the house" }
      - { id: o3, label: "at school", tts: "at school" }
  - prompt: "Sam finds Lily under a tree. Where is Lily?"
    prompt_text: "Sam מוֹצֵא אֶת Lily מִתַּחַת לְעֵץ. אֵיפֹה Lily?"
    items:
      - { id: o1, label: "under a tree", correct: true, tts: "under a tree" }
      - { id: o2, label: "on the roof", tts: "on the roof" }
      - { id: o3, label: "in a box", tts: "in a box" }
  - prompt: "Sam has a cat named Lily. Who has a cat?"
    prompt_text: "לְ-Sam יֵשׁ חָתוּל בְּשֵׁם Lily. לְמִי יֵשׁ חָתוּל?"
    items:
      - { id: o1, label: "Sam", correct: true, tts: "Sam" }
      - { id: o2, label: "Lily", tts: "Lily" }
      - { id: o3, label: "Max", tts: "Max" }
  - prompt: "Lily is a small white cat with green eyes. What color is Lily?"
    prompt_text: "Lily הִיא חֲתוּלָה לְבָנָה קְטַנָּה עִם עֵינַיִם יְרֻקּוֹת. בְּאֵיזֶה צֶבַע Lily?"
    items:
      - { id: o1, label: "black", tts: "black" }
      - { id: o2, label: "white", correct: true, tts: "white" }
      - { id: o3, label: "orange", tts: "orange" }
  - prompt: "Sam is very sad when he can not find Lily. How does Sam feel when Lily is lost?"
    prompt_text: "Sam מְאוֹד עָצוּב כְּשֶׁהוּא לֹא מוֹצֵא אֶת Lily. אֵיךְ Sam מַרְגִּישׁ כְּשֶׁ-Lily אֲבוּדָה?"
    items:
      - { id: o1, label: "sad", correct: true, tts: "sad" }
      - { id: o2, label: "happy", tts: "happy" }
      - { id: o3, label: "angry", tts: "angry" }
  - prompt: "Sam calls Lily's name again and again. What does Sam call?"
    prompt_text: "Sam קוֹרֵא בְּשֵׁם Lily שׁוּב וָשׁוּב. אֶת מָה Sam קוֹרֵא?"
    items:
      - { id: o1, label: "his own name", tts: "his own name" }
      - { id: o2, label: "Lily's name", correct: true, tts: "Lily's name" }
      - { id: o3, label: "the dog's name", tts: "the dog's name" }
  - prompt: "Lily ran away because she saw a yellow butterfly. Why did Lily run away?"
    prompt_text: "Lily בָּרְחָה כִּי הִיא רָאֲתָה פַּרְפַּר צָהֹב. לָמָּה Lily בָּרְחָה?"
    items:
      - { id: o1, label: "she was hungry", tts: "she was hungry" }
      - { id: o2, label: "she saw a butterfly", correct: true, tts: "she saw a butterfly" }
      - { id: o3, label: "she heard a noise", tts: "she heard a noise" }
  - prompt: "When Sam finds Lily, he gives her a big warm hug. What does Sam do when he finds Lily?"
    prompt_text: "כְּשֶׁ-Sam מוֹצֵא אֶת Lily, הוּא נוֹתֵן לָהּ חִבּוּק גָּדוֹל וְחַם. מָה Sam עוֹשֶׂה כְּשֶׁהוּא מוֹצֵא אֶת Lily?"
    items:
      - { id: o1, label: "he gives her a hug", correct: true, tts: "he gives her a hug" }
      - { id: o2, label: "he runs away", tts: "he runs away" }
      - { id: o3, label: "he closes the door", tts: "he closes the door" }
  - prompt: "After the hug, Sam and Lily go home for dinner. Where do Sam and Lily go?"
    prompt_text: "אַחֲרֵי הַחִבּוּק, Sam וְ-Lily הוֹלְכִים הַבַּיְתָה לַאֲרוּחַת עֶרֶב. לְאָן Sam וְ-Lily הוֹלְכִים?"
    items:
      - { id: o1, label: "to school", tts: "to school" }
      - { id: o2, label: "to the shop", tts: "to the shop" }
      - { id: o3, label: "home", correct: true, tts: "home" }
  - prompt: "Now Sam keeps the garden gate closed so Lily can not run away again. Why does Sam keep the gate closed?"
    prompt_text: "עַכְשָׁו Sam מַשְׁאִיר אֶת שַׁעַר הַגִּנָּה סָגוּר כְּדֵי שֶׁ-Lily לֹא תּוּכַל לִבְרֹחַ שׁוּב. לָמָּה Sam מַשְׁאִיר אֶת הַשַּׁעַר סָגוּר?"
    items:
      - { id: o1, label: "so Lily can not run away", correct: true, tts: "so Lily can not run away" }
      - { id: o2, label: "so the sun stays out", tts: "so the sun stays out" }
      - { id: o3, label: "so the rain comes in", tts: "so the rain comes in" }
reward: { stars: 3, sfx: ding, effect: confetti }
