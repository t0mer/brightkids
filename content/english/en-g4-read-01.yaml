id: en-g4-read-01
subject: english
grade: 4
difficulty: 3
locale: en-US
direction: ltr
title: "Read and Answer"
activity: multiple-choice
prompt_tts: "Read the sentence and answer."
instruction: "קִרְאוּ אֶת הַמִּשְׁפָּט וְעַנּוּ."
questions:
  - prompt: "The dog is red. What color is the dog?"
    prompt_text: "הַכֶּלֶב אָדֹם. בְּאֵיזֶה צֶבַע הַכֶּלֶב?"
    items:
      - { id: o1, label: "Red", correct: true, tts: "red" }
      - { id: o2, label: "Blue", tts: "blue" }
      - { id: o3, label: "Green", tts: "green" }
  - prompt: "The cat is big. How big is the cat?"
    prompt_text: "הֶחָתוּל גָּדוֹל. כַּמָּה גָּדוֹל הֶחָתוּל?"
    items:
      - { id: o1, label: "Big", correct: true, tts: "big" }
      - { id: o2, label: "Small", tts: "small" }
      - { id: o3, label: "Old", tts: "old" }
  - prompt: "The sun is hot. How does the sun feel?"
    prompt_text: "הַשֶּׁמֶשׁ חַמָּה. אֵיךְ מַרְגִּישָׁה הַשֶּׁמֶשׁ?"
    items:
      - { id: o1, label: "Hot", correct: true, tts: "hot" }
      - { id: o2, label: "Cold", tts: "cold" }
      - { id: o3, label: "Wet", tts: "wet" }
  - prompt: "The bird sings a song. What does the bird do?"
    prompt_text: "הַצִּפּוֹר שָׁרָה שִׁיר. מָה הַצִּפּוֹר עוֹשָׂה?"
    items:
      - { id: o1, label: "Runs", tts: "runs" }
      - { id: o2, label: "Sings", correct: true, tts: "sings" }
      - { id: o3, label: "Jumps", tts: "jumps" }
  - prompt: "The boy has a green hat. What color is the hat?"
    prompt_text: "לַיֶּלֶד יֵשׁ כּוֹבַע יָרֹק. בְּאֵיזֶה צֶבַע הַכּוֹבַע?"
    items:
      - { id: o1, label: "Yellow", tts: "yellow" }
      - { id: o2, label: "Brown", tts: "brown" }
      - { id: o3, label: "Green", correct: true, tts: "green" }
  - prompt: "The girl runs fast. How does the girl run?"
    prompt_text: "הַיַּלְדָּה רָצָה מַהֵר. אֵיךְ הַיַּלְדָּה רָצָה?"
    items:
      - { id: o1, label: "Fast", correct: true, tts: "fast" }
      - { id: o2, label: "Slow", tts: "slow" }
      - { id: o3, label: "Quiet", tts: "quiet" }
  - prompt: "The fish swims in the water. Where does the fish swim?"
    prompt_text: "הַדָּג שׂוֹחֶה בַּמַּיִם. אֵיפֹה הַדָּג שׂוֹחֶה?"
    items:
      - { id: o1, label: "In the sky", tts: "in the sky" }
      - { id: o2, label: "In the water", correct: true, tts: "in the water" }
      - { id: o3, label: "In the tree", tts: "in the tree" }
  - prompt: "The apple is sweet. How does the apple taste?"
    prompt_text: "הַתַּפּוּחַ מָתוֹק. אֵיךְ טַעַם הַתַּפּוּחַ?"
    items:
      - { id: o1, label: "Sour", tts: "sour" }
      - { id: o2, label: "Sweet", correct: true, tts: "sweet" }
      - { id: o3, label: "Salty", tts: "salty" }
  - prompt: "The car is fast and red. What color is the car?"
    prompt_text: "הַמְּכוֹנִית מְהִירָה וַאֲדֻמָּה. בְּאֵיזֶה צֶבַע הַמְּכוֹנִית?"
    items:
      - { id: o1, label: "Red", correct: true, tts: "red" }
      - { id: o2, label: "White", tts: "white" }
      - { id: o3, label: "Black", tts: "black" }
  - prompt: "The night is dark. How is the night?"
    prompt_text: "הַלַּיְלָה חָשׁוּךְ. אֵיךְ הַלַּיְלָה?"
    items:
      - { id: o1, label: "Bright", tts: "bright" }
      - { id: o2, label: "Warm", tts: "warm" }
      - { id: o3, label: "Dark", correct: true, tts: "dark" }
  - prompt: "The baby is happy. How does the baby feel?"
    prompt_text: "הַתִּינוֹק שָׂמֵחַ. אֵיךְ הַתִּינוֹק מַרְגִּישׁ?"
    items:
      - { id: o1, label: "Happy", correct: true, tts: "happy" }
      - { id: o2, label: "Angry", tts: "angry" }
      - { id: o3, label: "Tired", tts: "tired" }
  - prompt: "The tree is very tall. How is the tree?"
    prompt_text: "הָעֵץ גָּבוֹהַּ מְאוֹד. אֵיךְ הָעֵץ?"
    items:
      - { id: o1, label: "Short", tts: "short" }
      - { id: o2, label: "Tall", correct: true, tts: "tall" }
      - { id: o3, label: "Wide", tts: "wide" }
reward: { stars: 3, sfx: ding, effect: confetti }
