    prompt_text: "מָתַי יוֹם הַהֻלֶּדֶת שֶׁלָּכֶם? בַּחֲרוּ אֶת הַמִּשְׁפָּט הַנָּכוֹן."
    items:
      - { id: o1, label: "My birthday is in May.", correct: true, tts: "My birthday is in May." }
      - { id: o2, label: "My birthday is in blue.", tts: "My birthday is in blue." }
      - { id: o3, label: "My birthday is in dog.", tts: "My birthday is in dog." }
