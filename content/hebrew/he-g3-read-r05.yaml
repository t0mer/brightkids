      - { id: o1, label: "הָעַכְבָּר עָזַר לָאַרְיֵה", correct: true }
      - { id: o2, label: "הָאַרְיֵה עָזַר לָעַכְבָּר" }
      - { id: o3, label: "הָאִישׁ עָזַר לָאַרְיֵה" }
  - prompt: "כֹּל בֹּקֶר הַתַּרְנְגוֹל מְעוֹרֵר אֶת הַחַוָּה בִּקְרִיאָתוֹ. מָתַי קוֹרֵא הַתַּרְנְגוֹל?"
