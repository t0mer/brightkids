  - prompt: "בַּחֹרֶף יָרַד גֶּשֶׁם רַב וְהַיְּלָדִים פָּתְחוּ מִטְרִיּוֹת צִבְעוֹנִיּוֹת. מָתַי יָרַד הַגֶּשֶׁם?"
