      - { id: o2, label: "תַּפּוּחִים" }
      - { id: o3, label: "גֶּזֶר" }
  - prompt: "הַצָּב הָאִטִּי נִיצַּח אֶת הָאַרְנָב הַמָּהִיר בַּמֵּרוֹץ. מִי נִיצַּח בַּמֵּרוֹץ?"
