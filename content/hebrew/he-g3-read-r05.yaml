  - prompt: "תּוֹמֶר מָצָא גּוּר חֲתוּלִים רָעֵב בֶּחָצֵר וְנָתַן לוֹ קְצָת חָלָב. מָה נָתַן תּוֹמֶר לַגּוּר?"
