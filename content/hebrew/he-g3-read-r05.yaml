      - { id: o1, label: "בַּקַּיִץ", correct: true }
      - { id: o2, label: "בַּחֹרֶף" }
      - { id: o3, label: "בָּאָבִיב" }
  - prompt: "הַשּׁוּעָל רָצָה לֶאֱכֹל עֲנָבִים אַךְ לֹא הִצְלִיחַ לְהַגִּיעַ אֲלֵיהֶם. מָה רָצָה הַשּׁוּעָל לֶאֱכֹל?"
