  - prompt: "הַיַּלְדָּה הַקְּטַנָּה פָּחֲדָה מִן הָרַעַם אַךְ אִמָּא חִיבְּקָה אוֹתָהּ וְהִרְגִּיעָה. מִמָּה פָּחֲדָה הַיַּלְדָּה?"
