  - prompt: "הַפִּיל הֶעָנָק הִתִּיז מַיִם בְּחַדְקוֹ הָאָרֹךְ וְרִיסֵּס אֶת כֹּל הַחֲבֵרִים. בְּמָה הִתִּיז הַפִּיל מַיִם?"
    items:
