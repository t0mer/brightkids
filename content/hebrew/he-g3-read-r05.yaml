  - prompt: "מַיָה קִיבְּלָה אוֹפַנַּיִם אֲדֻמִּים לְיוֹם הַהֻלֶּדֶת וְשָׂמְחָה מְאוֹד. מָה קִיבְּלָה מַיָה לְיוֹם הַהֻלֶּדֶת?"
