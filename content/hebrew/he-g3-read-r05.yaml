      - { id: o1, label: "בַּבֹּקֶר", correct: true }
      - { id: o2, label: "בַּלַּיְלָה" }
      - { id: o3, label: "בַּצָּהֳרַיִם" }
  - prompt: "הַנְּמָלָה אָגְרָה אֹכֶל בַּקַּיִץ כְּדֵי שֶׁיִּהְיֶה לָהּ בַּחֹרֶף. מָתַי אָגְרָה הַנְּמָלָה אֹכֶל?"
