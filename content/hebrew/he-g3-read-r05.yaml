  - prompt: "הַדְּבוֹרָה הַחֲרוּצָה אָסְפָה צוּף מִן הַפְּרָחִים וְהֵכִינָה מִמֶּנּוּ דְּבַשׁ מָתוֹק. מָה הֵכִינָה הַדְּבוֹרָה?"
