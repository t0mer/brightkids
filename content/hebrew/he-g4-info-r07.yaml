      - { id: o2, label: "חֶמְאָה" }
      - { id: o3, label: "גְּבִינָה" }
  - prompt: "הַפִּינְגְּוִוין חַי בִּמְקוֹמוֹת קָרִים וְשׂוֹחֶה הֵיטֵב בַּמַּיִם. הֵיכָן חַי הַפִּינְגְּוִוין?"
    items:
      - { id: o1, label: "בִּמְקוֹמוֹת קָרִים", correct: true }
      - { id: o2, label: "בַּמִּדְבָּר" }
      - { id: o3, label: "בַּיַּעַר" }
  - prompt: "הַגִּ'ירָפָה הִיא בַּעַל הַחַיִּים הַגָּבוֹהַּ בְּיוֹתֵר. הַצַּוָּאר הָאָרֹךְ שֶׁלָּהּ עוֹזֵר לָהּ לֶאֱכֹל עָלִים מִן הָעֵצִים הַגְּבוֹהִים. מָה עוֹזֵר לַגִּ'ירָפָה לֶאֱכֹל מִן הָעֵצִים?"
