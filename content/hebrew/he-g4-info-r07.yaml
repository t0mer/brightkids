      - { id: o1, label: "בְּזִימִים" }
      - { id: o2, label: "דֶּרֶךְ הָעוֹר" }
      - { id: o3, label: "נוֹשֵׁם אֲוִיר", correct: true }
  - prompt: "הָעֲטַלֵּף יָשֵׁן בַּיּוֹם וְיוֹצֵא לָצוּד בַּלַּיְלָה. מָתַי פָּעִיל הָעֲטַלֵּף?"
    items:
      - { id: o1, label: "בַּצָּהֳרַיִם" }
      - { id: o2, label: "בַּלַּיְלָה", correct: true }
      - { id: o3, label: "בַּבֹּקֶר" }
  - prompt: "הַצָּב נוֹשֵׂא עַל גַּבּוֹ שִׁרְיוֹן קָשֶׁה הַמֵּגֵן עָלָיו מִפְּנֵי טוֹרְפִים. מָה מֵגֵן עַל הַצָּב?"
    items:
      - { id: o1, label: "הַשִּׁרְיוֹן הַקָּשֶׁה", correct: true }
      - { id: o2, label: "הַכְּנָפַיִם" }
      - { id: o3, label: "הַשִּׁנַּיִם הַחַדּוֹת" }
  - prompt: "הַנְּמָלָה הִיא חֶרֶק חָרוּץ הַסּוֹחֵב מָזוֹן הַכָּבֵד מִמֶּנָּה אֶל הַקֵּן. לְאָן סוֹחֶבֶת הַנְּמָלָה אֶת הַמָּזוֹן?"
    items:
      - { id: o1, label: "אֶל הַנָּהָר" }
      - { id: o2, label: "אֶל הַקֵּן", correct: true }
      - { id: o3, label: "אֶל הָעֵץ" }
  - prompt: "הָעֲרָבָה הַקֹּטֶבֶת לְבָנָה, וְכָךְ קַל לַדֹּב הַלָּבָן לְהִסְתַּתֵּר בַּשֶּׁלֶג. מַדּוּעַ הַדֹּב הַלָּבָן לָבָן?"
    items:
      - { id: o1, label: "כְּדֵי לְהִסְתַּתֵּר בַּשֶּׁלֶג", correct: true }
      - { id: o2, label: "כְּדֵי לָעוּף גָּבוֹהַּ" }
      - { id: o3, label: "כְּדֵי לִשְׂחוֹת מַהֵר" }
reward: { stars: 3, sfx: pop, effect: confetti }
