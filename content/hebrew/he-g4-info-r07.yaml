      - { id: o1, label: "בַּחֵדֶק", correct: true }
      - { id: o2, label: "בָּאָזְנַיִם" }
      - { id: o3, label: "בָּרַגְלַיִם" }
  - prompt: "הַגָּמָל יָכוֹל לִחְיוֹת יָמִים רַבִּים בְּלִי מַיִם הוֹדוֹת לַחֲטוֹטֶרֶת שֶׁלּוֹ. מָה עוֹזֵר לַגָּמָל לִחְיוֹת בְּלִי מַיִם?"
    items:
      - { id: o1, label: "הַחֲטוֹטֶרֶת", correct: true }
      - { id: o2, label: "הַזָּנָב" }
      - { id: o3, label: "הָאָזְנַיִם" }
  - prompt: "הַדְּבוֹרָה אוֹסֶפֶת צוּף מִן הַפְּרָחִים וּמְיַיצֶּרֶת מִמֶּנּוּ דְּבַשׁ. מָה מְיַיצֶּרֶת הַדְּבוֹרָה?"
