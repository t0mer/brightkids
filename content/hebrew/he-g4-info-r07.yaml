      - { id: o1, label: "הַזָּנָב הַקָּצָר" }
      - { id: o2, label: "הַצַּוָּאר הָאָרֹךְ", correct: true }
      - { id: o3, label: "הָרַגְלַיִם הַקְּצָרוֹת" }
  - prompt: "הַדּוֹלְפִין הוּא יוֹנֵק הַחַי בַּיָּם, אַךְ אֵינוֹ דָּג, וְלָכֵן הוּא עוֹלֶה לִפְנֵי הַמַּיִם וְנוֹשֵׁם אֲוִיר. כֵּיצַד נוֹשֵׁם הַדּוֹלְפִין?"
