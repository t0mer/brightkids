prompt_tts: "הַקְשִׁיבוּ לַקֶּטַע וּבַחֲרוּ אֶת הַתְּשׁוּבָה הַנְּכוֹנָה"
questions:
  - prompt: "הַפִּיל הוּא בַּעַל הַחַיִּים הַיַּבָּשָׁתִי הַגָּדוֹל בְּיוֹתֵר. הוּא מִשְׁתַּמֵּשׁ בַּחֵדֶק כְּדֵי לִשְׁתּוֹת. בְּמָה מִשְׁתַּמֵּשׁ הַפִּיל כְּדֵי לִשְׁתּוֹת?"
