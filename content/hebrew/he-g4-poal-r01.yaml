      - { id: o1, label: "נֵלֵךְ", correct: true }
      - { id: o2, label: "הָלַכְנוּ" }
      - { id: o3, label: "הוֹלֵךְ" }
  - prompt: "אֶתְמוֹל הֵם ___ הַבַּיְתָה. אֵיזֶה פֹּעַל מַתְאִים לֶעָבָר רַבִּים?"
