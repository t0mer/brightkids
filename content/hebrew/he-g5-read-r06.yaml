prompt_tts: "הַקְשִׁיבוּ לַסִּיפּוּר וּבַחֲרוּ אֶת הַתְּשׁוּבָה הַנְּכוֹנָה"
questions:
  - prompt: "הַבַּרְוְזוֹן הַמְכֹעָר הָיָה שׁוֹנֶה מֵאֶחָיו, וּלְבַסּוֹף גָּדַל וְהָפַךְ לְבַרְבּוּר יָפֶה. לְמָה הָפַךְ הַבַּרְוְזוֹן בַּסּוֹף?"
    items:
      - { id: o1, label: "לְבַרְבּוּר יָפֶה", correct: true }
      - { id: o2, label: "לְבַרְוָז מְכֹעָר" }
      - { id: o3, label: "לְתַרְנְגוֹל" }
  - prompt: "כִּיפָּה אֲדֻמָּה הָלְכָה בַּיַּעַר אֶל בֵּית סָבְתָא וּפָגְשָׁה זְאֵב. אֶת מִי פָּגְשָׁה כִּיפָּה אֲדֻמָּה?"
    items:
      - { id: o1, label: "זְאֵב", correct: true }
      - { id: o2, label: "דֹּב" }
      - { id: o3, label: "שׁוּעָל" }
  - prompt: "פִּינוֹקְיוֹ הָיָה בּוּבָּה שֶׁל עֵץ, וְכַאֲשֶׁר שִׁיקֵּר הָאַף שֶׁלּוֹ הִתְאָרֵךְ. מָה קָרָה לָאַף שֶׁל פִּינוֹקְיוֹ כַּאֲשֶׁר שִׁיקֵּר?"
    items:
      - { id: o1, label: "הוּא הִתְאָרֵךְ", correct: true }
      - { id: o2, label: "הוּא הִתְקַצֵּר" }
      - { id: o3, label: "הוּא נֶעֱלַם" }
  - prompt: "סִינְדֶּרֶלָה אִיבְּדָה נַעַל זְכוּכִית בַּנֶּשֶׁף בַּחֲצוֹת. מָה אִיבְּדָה סִינְדֶּרֶלָה?"
    items:
      - { id: o1, label: "נַעַל זְכוּכִית", correct: true }
      - { id: o2, label: "כֶּתֶר זָהָב" }
      - { id: o3, label: "טַבַּעַת" }
