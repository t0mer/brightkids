title: "הֲבָנַת הַנִּקְרָא: אַגָּדוֹת מֻכָּרוֹת"
activity: multiple-choice
prompt_tts: "הַקְשִׁיבוּ לַסִּיפּוּר וּבַחֲרוּ אֶת הַתְּשׁוּבָה הַנְּכוֹנָה"
questions:
  - prompt: "הַבַּרְוְזוֹן הַמְכֹעָר הָיָה שׁוֹנֶה מֵאֶחָיו, וּלְבַסּוֹף גָּדַל וְהָפַךְ לְבַרְבּוּר יָפֶה. לְמָה הָפַךְ הַבַּרְוְזוֹן בַּסּוֹף?"
    items:
      - { id: o1, label: "לְבַרְבּוּר יָפֶה", correct: true }
      - { id: o2, label: "לְבַרְוָז מְכֹעָר" }
      - { id: o3, label: "לְתַרְנְגוֹל" }
  - prompt: "כִּיפָּה אֲדֻמָּה הָלְכָה בַּיַּעַר אֶל בֵּית סָבְתָא וּפָגְשָׁה זְאֵב. אֶת מִי פָּגְשָׁה כִּיפָּה אֲדֻמָּה?"
    items:
      - { id: o1, label: "זְאֵב", correct: true }
      - { id: o2, label: "דֹּב" }
      - { id: o3, label: "שׁוּעָל" }
  - prompt: "פִּינוֹקְיוֹ הָיָה בּוּבָּה שֶׁל עֵץ, וְכַאֲשֶׁר שִׁיקֵּר הָאַף שֶׁלּוֹ הִתְאָרֵךְ. מָה קָרָה לָאַף שֶׁל פִּינוֹקְיוֹ כַּאֲשֶׁר שִׁיקֵּר?"
    items:
      - { id: o1, label: "הוּא הִתְאָרֵךְ", correct: true }
      - { id: o2, label: "הוּא הִתְקַצֵּר" }
      - { id: o3, label: "הוּא נֶעֱלַם" }
  - prompt: "סִינְדֶּרֶלָה אִיבְּדָה נַעַל זְכוּכִית בַּנֶּשֶׁף בַּחֲצוֹת. מָה אִיבְּדָה סִינְדֶּרֶלָה?"
    items:
      - { id: o1, label: "נַעַל זְכוּכִית", correct: true }
      - { id: o2, label: "כֶּתֶר זָהָב" }
      - { id: o3, label: "טַבַּעַת" }
  - prompt: "שִׁלְגִּיָּה נָגְסָה בְּתַפּוּחַ מֻרְעָל וְנָפְלָה לְשֵׁינָה עֲמֻקָּה. מָה גָּרַם לְשִׁלְגִּיָּה לְהֵירָדֵם?"
    items:
      - { id: o1, label: "כּוֹס מַיִם" }
      - { id: o2, label: "תַּפּוּחַ מֻרְעָל", correct: true }
      - { id: o3, label: "פְּרִי מָתוֹק" }
  - prompt: "שְׁלוֹשֶׁת הַחֲזִירִים בָּנוּ בָּתִּים, וְהַזְּאֵב לֹא הִצְלִיחַ לְהַפִּיל אֶת בֵּית הַלְּבֵנִים. אֵיזֶה בַּיִת עָמַד אֵיתָן?"
    items:
      - { id: o1, label: "בֵּית הַקַּשׁ" }
      - { id: o2, label: "בֵּית הָעֵצִים" }
      - { id: o3, label: "בֵּית הַלְּבֵנִים", correct: true }
  - prompt: "הַצָּב וְהָאַרְנָב עָרְכוּ מֵרוֹץ, וְהַצָּב הַמַּתְמִיד נִיצַּח. מִי נִיצַּח בַּמֵּרוֹץ?"
    items:
      - { id: o1, label: "הַצָּב", correct: true }
      - { id: o2, label: "הָאַרְנָב" }
      - { id: o3, label: "הַשּׁוּעָל" }
  - prompt: "הַנְּסִיכָה דָּקְרָה אֶת אֶצְבָּעָהּ בְּכִישׁוֹר וְנִרְדְּמָה לְמֵאָה שָׁנִים. מָה קָרָה לַנְּסִיכָה אַחֲרֵי שֶׁדָּקְרָה אֶת אֶצְבָּעָהּ?"
    items:
      - { id: o1, label: "הִיא בָּכְתָה" }
      - { id: o2, label: "הִיא נִרְדְּמָה", correct: true }
      - { id: o3, label: "הִיא בָּרְחָה" }
  - prompt: "יוֹסִי שָׁתַל גַּרְעִינֵי קֶסֶם, וּבַבֹּקֶר צָמַח גִּבְעוֹל עֲנָק עַד הַשָּׁמַיִם. מָה צָמַח מִן הַגַּרְעִינִים?"
    items:
      - { id: o1, label: "פֶּרַח קָטָן" }
      - { id: o2, label: "עֵץ תַּפּוּחִים" }
      - { id: o3, label: "גִּבְעוֹל עֲנָק", correct: true }
  - prompt: "הֶנְזֶל וּגְרֶטֶל מָצְאוּ בַּיַּעַר בַּיִת עָשׂוּי מַמְתַּקִּים. מִמָּה הָיָה עָשׂוּי הַבַּיִת בַּיַּעַר?"
    items:
      - { id: o1, label: "מַמְתַּקִּים", correct: true }
      - { id: o2, label: "לְבֵנִים" }
      - { id: o3, label: "זָהָב" }
reward: { stars: 3, sfx: pop, effect: confetti }
