id: he-g5-siba-r02
subject: hebrew
grade: 5
difficulty: 3
locale: he-IL
direction: rtl
title: "סִיבָּה וְתוֹצָאָה"
activity: multiple-choice
prompt_tts: "בַּחֲרוּ אֶת הַתּוֹצָאָה הַמַּתְאִימָה"
questions:
  - prompt: "הַיֶּלֶד לֹא לָמַד לַמִּבְחָן, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הוּא נִכְשַׁל בַּמִּבְחָן", correct: true }
      - { id: o2, label: "הוּא הִצְלִיחַ בְּקַלּוּת" }
      - { id: o3, label: "הוּא קִיבֵּל פְּרָס" }
  - prompt: "יָרַד גֶּשֶׁם חָזָק, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הַכְּבִישׁ הִתְמַלֵּא בְּמַיִם", correct: true }
      - { id: o2, label: "הַשֶּׁמֶשׁ זָרְחָה בְּחֹזֶק" }
      - { id: o3, label: "הָיָה יָבֵשׁ מְאוֹד" }
  - prompt: "הַיַּלְדָּה אָכְלָה אֲרוּחָה גְּדוֹלָה, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הִיא הִרְגִּישָׁה שְׂבֵעָה", correct: true }
      - { id: o2, label: "הִיא הָיְתָה רְעֵבָה מְאוֹד" }
      - { id: o3, label: "הִיא בִּיקְּשָׁה עוֹד אֹכֶל" }
  - prompt: "הַיֶּלֶד שָׁכַח אֶת הַמִּטְרִיָּה וְיָרַד גֶּשֶׁם, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הוּא נִרְטַב", correct: true }
      - { id: o2, label: "הוּא נִשְׁאַר יָבֵשׁ" }
      - { id: o3, label: "הוּא הִתְחַמֵּם" }
  - prompt: "הַשֶּׁמֶשׁ זָרְחָה חָזָק כָּל הַיּוֹם, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "יָרַד שֶׁלֶג רַב" }
      - { id: o2, label: "הָיָה חַם מְאוֹד בַּחוּץ", correct: true }
      - { id: o3, label: "הָיָה קַר וְגָשׁוּם" }
  - prompt: "הַיֶּלֶד נָגַע בַּתַּנּוּר הַחַם, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הוּא נִכְוָה בַּיָּד", correct: true }
      - { id: o2, label: "הוּא הִתְקָרֵר מְאוֹד" }
      - { id: o3, label: "הוּא נִרְדַּם מִיָּד" }
  - prompt: "הַיַּלְדָּה הִתְאַמְּנָה כָּל יוֹם, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הִיא הִפְסִידָה תָּמִיד" }
      - { id: o2, label: "הִיא שָׁכְחָה אֵיךְ לְשַׂחֵק" }
      - { id: o3, label: "הִיא נִיצְּחָה בַּתַּחֲרוּת", correct: true }
  - prompt: "הַכֶּלֶב הָיָה רָעֵב מְאוֹד, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הוּא יָשַׁן כָּל הַיּוֹם" }
      - { id: o2, label: "הוּא אָכַל אֶת הָאֹכֶל בִּמְהִירוּת", correct: true }
      - { id: o3, label: "הוּא שִׂיחֵק בֶּחָצֵר" }
  - prompt: "הַזְּרָעִים קִיבְּלוּ מַיִם וְשֶׁמֶשׁ, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "הֵם צָמְחוּ וְגָדְלוּ", correct: true }
      - { id: o2, label: "הֵם הִתְיַבְּשׁוּ לְגַמְרֵי" }
      - { id: o3, label: "הֵם נֶעֶלְמוּ בָּאֲדָמָה" }
  - prompt: "הַיֶּלֶד צִיחְצֵחַ שִׁינַּיִם כָּל יוֹם, לָכֵן ___ . מָה הַתּוֹצָאָה הַמַּתְאִימָה?"
    items:
      - { id: o1, label: "כָּל שִׁינָּיו נָפְלוּ" }
      - { id: o2, label: "הוּא חָלָה בְּכְאֵב בֶּטֶן" }
      - { id: o3, label: "לֹא הָיוּ לוֹ חוֹרִים בַּשִּׁינַּיִם", correct: true }
reward: { stars: 3, sfx: pop, effect: confetti }
