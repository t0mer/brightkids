version: 2

project_name: brightkids

before:
  hooks:
    - go mod tidy

builds:
  - id: brightkids
    main: ./cmd/brightkids
    binary: brightkids
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/t0mer/brightkids/internal/version.Version={{.Version}}
      - -X github.com/t0mer/brightkids/internal/version.Commit={{.Commit}}
      - -X github.com/t0mer/brightkids/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: brightkids
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
