name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve Go packages
        id: pkgs
        run: echo "list=$(go list ./... | grep -v /node_modules/ | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: go vet
        run: go vet ${{ steps.pkgs.outputs.list }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test ${{ steps.pkgs.outputs.list }} -race -coverprofile=coverage.out

      - name: Build
        run: go build ${{ steps.pkgs.outputs.list }}
