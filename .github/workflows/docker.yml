name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (blank = auto-increment YYYY.M.PATCH from latest tag)"
        required: false
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write

jobs:
  docker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          NEEDS_TAG=true
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            VERSION="$(git describe --tags --abbrev=0)"
            VERSION="${VERSION#v}"
            NEEDS_TAG=false
          else
            VERSION="$(./scripts/next-version.sh)"
          fi
          [ -n "$VERSION" ] || { echo "::error::could not resolve a version"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "needs_tag=$NEEDS_TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            techblog/brightkids:latest
            techblog/brightkids:${{ steps.version.outputs.version }}

      - name: Tag published version
        if: steps.version.outputs.needs_tag == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
